name: Weekly Menu Sync

on:
  schedule:
    # Run every Sunday at 11 PM ET (4 AM UTC Monday)
    - cron: '0 4 * * 1'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Puppeteer browsers
        run: npx puppeteer browsers install

      - name: Run all scrapers
        run: npm run scrape:all -- --skip-dfb
        continue-on-error: true

      - name: Check scraped output
        id: check_scraped
        run: |
          # Gate on TOTAL ITEM COUNT, not "a file exists": empty scrapes still
          # write a file, so the old file-count check let a fully-broken scrape
          # proceed to the DB. Require a sane minimum before touching the DB.
          item_count=$(node -e "
            const fs=require('fs');const dir='data/scraped';let total=0;
            if(fs.existsSync(dir)){for(const f of fs.readdirSync(dir).filter(f=>f.endsWith('.json'))){
              try{const d=JSON.parse(fs.readFileSync(dir+'/'+f,'utf8'));
                total+=(d.restaurants||[]).reduce((s,r)=>s+((r.items||[]).length),0);}catch{}}}
            console.log(total);
          ")
          echo "item_count=$item_count" >> $GITHUB_OUTPUT
          echo "Scraped item count: $item_count"
          if [ "$item_count" -lt 100 ]; then
            echo "::warning::Only $item_count scraped items (< 100) — scrapers likely failing; skipping DB sync."
          fi

      - name: Merge with database
        if: fromJSON(steps.check_scraped.outputs.item_count) >= 100
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run sync:merge

      - name: Estimate nutrition
        if: fromJSON(steps.check_scraped.outputs.item_count) >= 100
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run sync:estimate

      - name: Generate diff report
        if: fromJSON(steps.check_scraped.outputs.item_count) >= 100
        run: npm run sync:report

      - name: Auto-approve high-confidence items
        if: fromJSON(steps.check_scraped.outputs.item_count) >= 100
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        # No continue-on-error: a failed import (approve sets a non-zero exit on
        # errors, or the volume circuit-breaker trips) should fail the run loudly.
        run: npm run sync:approve -- --auto

      - name: Upload report + pending artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          # Curated review artifacts only. Raw scraped/approved data is NOT
          # committed to the repo — Supabase is the source of truth, and those
          # paths stay gitignored (force-committing them previously overrode the
          # ignore rules and defeated the secret-leak backstop).
          name: menu-sync-report-${{ github.run_id }}
          path: |
            data/pending/report-*.md
            data/pending/report-*.json
            data/pending/estimated-*.json
          retention-days: 30
